<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Frutolyte - Coming Soon</title>
  <style>
    :root {
      --green: #2e7d32;
      --light-green: #e8f5e9;
      --red: #d32f2f;
      --bg: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('1286689.jpg') no-repeat center center/cover;
      color: var(--green);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      text-align: center;
      padding: 20px;
    }

    img.logo {
      width: 160px;
      max-width: 40vw;
      margin-bottom: 20px;
      animation: floatIn 1.2s ease-in-out;
    }

    @keyframes floatIn {
      0% { transform: translateY(-20px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    h1 {
      font-size: clamp(2rem, 6vw, 2.8rem);
      margin-bottom: 10px;
      color: var(--light-green);
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
    }

    p {
      font-size: clamp(1rem, 3vw, 1.2rem);
      color: #fff;
      max-width: 600px;
      margin-bottom: 30px;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
    }

    form {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      width: 100%;
      max-width: 500px;
    }

    input[type="email"] {
      padding: 12px;
      width: 100%;
      max-width: 300px;
      border: 2px solid var(--green);
      border-radius: 5px;
      outline: none;
      font-size: clamp(0.9rem, 2.5vw, 1rem);
      background: rgba(255, 255, 255, 0.9);
    }

    button {
      padding: 12px 24px;
      background-color: var(--red);
      color: white;
      border: none;
      border-radius: 5px;
      font-size: clamp(0.9rem, 2.5vw, 1rem);
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background-color: #b71c1c;
    }

    #messageBox {
      display: none;
      padding: 12px;
      margin-top: 20px;
      border-radius: 5px;
      font-size: 1rem;
      font-weight: 500;
      max-width: 500px;
      width: 100%;
      text-align: center;
    }

    footer {
      position: fixed;
      bottom: 15px;
      font-size: clamp(0.8rem, 2vw, 0.9rem);
      color: #ddd;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
    }

    @media (max-width: 768px) {
      img.logo {
        width: 120px;
        max-width: 35vw;
      }
      form {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <img src="img8.png" alt="Frutolyte Logo" class="logo" />
  <h1>Coming Soon</h1>
  <h2>Frutolyte - An ORS Product</h2>
  <p>We’re working on something refreshing for your health. Frutolyte will be live soon!</p>

  <form id="notifyForm">
    <input type="email" id="emailInput" placeholder="Enter your email to get updates" required />
    <button type="submit">Notify Me</button>
  </form>

  <div id="messageBox"></div>

  <footer>© 2025 Frutolyte.com. All rights reserved.</footer>

  <script>
    document.getElementById('notifyForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const email = document.getElementById('emailInput').value;
      const messageBox = document.getElementById('messageBox');

      messageBox.style.display = "block";
      messageBox.textContent = "Submitting... please wait.";
      messageBox.style.backgroundColor = "#fff3cd";
      messageBox.style.color = "#856404";

      try {
        const url = `https://script.google.com/macros/s/AKfycbxX_-FTv5B-HnzdfDAZcx1P2R8YrHNezxpFFYp2BR8mGZTAEpW3iRLKt1sE219uxa1jfw/exec?email=${encodeURIComponent(email)}`;
        const response = await fetch(url);
        const data = await response.json();

        if (data.success) {
          messageBox.style.backgroundColor = "#e8f5e9";  // light green
          messageBox.style.color = "#2e7d32";
          messageBox.textContent = "✅ Thank you! You will be notified soon.";
        } else {
          throw new Error(data.message || "Something went wrong. Please try again later.");
        }
      } catch (err) {
        messageBox.style.backgroundColor = "#fdecea";  // light red
        messageBox.style.color = "#d32f2f";
        messageBox.textContent = `❌ Error: ${err.message || err}`;
        console.error(err);
      }
    });
  </script>
</body>
</html>
